services:
  schedulesystem:
    build:
      context: ..
      dockerfile: Dockerfile
    image: schedulesystem:latest
    container_name: schedulesystem
    restart: unless-stopped
    network_mode: host
    env_file:
      - schedulesystem.env
    volumes:
      - schedulesystem-keys:/var/lib/schedulesystem/keys
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    mem_limit: 512m
    mem_reservation: 256m
    pids_limit: 128
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

volumes:
  schedulesystem-keys:
