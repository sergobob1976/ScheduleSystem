<VirtualHost *:80>
    ServerName schedule.college.cv.ua

    RewriteEngine On
    RewriteRule ^ https://%{HTTP_HOST}%{REQUEST_URI} [R=301,L]
</VirtualHost>

<VirtualHost *:443>
    ServerName schedule.college.cv.ua

    SSLEngine On
    SSLCertificateFile /etc/letsencrypt/live/schedule.college.cv.ua/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/schedule.college.cv.ua/privkey.pem

    ProxyRequests Off
    ProxyPreserveHost On
    ProxyTimeout 120

    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Port "443"

    ProxyPass / http://127.0.0.1:5085/ retry=0
    ProxyPassReverse / http://127.0.0.1:5085/

    Header always set X-Content-Type-Options "nosniff"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
    Header always set Strict-Transport-Security "max-age=31536000"

    ErrorLog ${APACHE_LOG_DIR}/schedule-error.log
    CustomLog ${APACHE_LOG_DIR}/schedule-access.log combined
</VirtualHost>
